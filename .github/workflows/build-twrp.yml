name: Build TWRP for Infinix X663

on:
  workflow_dispatch:

jobs:
  build:
    name: Build TWRP Recovery
    runs-on: ubuntu-20.04
    permissions:
      contents: write

    steps:
    - name: Checkout Device Tree
      uses: actions/checkout@v4
      with:
        path: device/infinix/Infinix-X663

    - name: Setup Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Sync TWRP Source (AOSP 11)
      run: |
        mkdir twrp
        cd twrp
        repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-11
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Move Device Tree to Workspace
      run: |
        mv device twrp/

    - name: Build TWRP Image
      run: |
        cd twrp
        source build/envsetup.sh
        # Deteksi otomatis prefix makefile (twrp_ atau omni_)
        if [ -f "device/infinix/Infinix-X663/twrp_Infinix-X663.mk" ]; then
          lunch twrp_Infinix-X663-eng
        else
          lunch omni_Infinix-X663-eng
        fi
        make clean
        make bootimage -j$(nproc --all)

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Infinix-X663-Build
        path: |
          twrp/out/target/product/Infinix-X663/boot.img
          twrp/out/target/product/Infinix-X663/recovery.img
